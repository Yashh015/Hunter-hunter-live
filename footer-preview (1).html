<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000}
.footer{background:#000;color:#f2ede6;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.footer-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:48px;max-width:880px;margin:0 auto;padding:80px 24px 60px;position:relative;z-index:2}
.brand-name{font-size:22px;font-weight:800;letter-spacing:-0.03em;color:#f2ede6;margin-bottom:4px}
.col-label{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(242,237,230,0.28);margin-bottom:16px}
.links{display:flex;flex-direction:column;gap:12px}
.links a{font-size:13px;font-weight:500;color:rgba(242,237,230,0.55);text-decoration:none}
.email{font-size:13px;font-weight:500;color:rgba(242,237,230,0.55);text-decoration:none;display:block;margin-bottom:24px}
.ai-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ai-row svg{width:18px;height:18px;opacity:0.35;fill:#f2ede6;flex-shrink:0}
/* No divider — image bleeds directly */
.img-wrap{position:relative;width:100%;overflow:hidden;margin-top:-20px}
.img-wrap img{width:100%;display:block;object-fit:cover;object-position:center 30%;max-height:480px}
/* Gentle top fade only — let the image breathe */
.img-wrap::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, #000 0%, rgba(0,0,0,0.5) 12%, transparent 30%, transparent 60%, #000 100%),
    linear-gradient(to right, #000 0%, transparent 20%, transparent 80%, #000 100%);
  z-index:1;
  pointer-events:none
}
.copy{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:11px;color:rgba(242,237,230,0.28);letter-spacing:0.08em;z-index:2}
</style>
</head>
